<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Juan Martin Mansilla" />
    <title>Desafio Buffo 2026 - Sierras Chicas Trail</title>
    <meta
      name="description"
      content="La carrera de Trail mas desafiante de Sierras Chicas."
    />
    <!--Favicon-->
    <link
      rel="icon"
      type="image/jpeg"
      href="../assets/favicon/favicon-buffo.jpeg"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body data-bs-spy="scroll" data-bs-target=".navbar" data-bs-offset="70">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="#">SIERRAS CHICAS <span>TRAIL</span></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <i class="fas fa-bars text-white"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="#inicio">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#nosotros">La Carrera</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#distancias">Distancias</a>
            </li>
            <li class="nav-item mt-3 mt-lg-0 ms-lg-3">
              <a class="nav-link btn-inscribirse" href="#inscripcion"
                >Inscribirme</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <header></header>
    <main><h1>Juan Martin Mansilla</h1></main>
    <footer></footer>
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Script for Navbar -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const navbar = document.querySelector(".navbar");

        // Función para cambiar color del navbar en scroll
        window.addEventListener("scroll", function () {
          if (window.scrollY > 50) {
            navbar.classList.add("scrolled");
          } else {
            navbar.classList.remove("scrolled");
          }
        });

        // Trigger scroll check on load just in case page is refreshed midway
        if (window.scrollY > 50) {
          navbar.classList.add("scrolled");
        }
      });
    </script>
  </body>
</html>
