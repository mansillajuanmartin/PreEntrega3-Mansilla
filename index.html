<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Juan Martin Mansilla" />
    <title>Desafio Buffo 2026 - Sierras Chicas Trail</title>
    <meta
      name="description"
      content="La carrera de Trail mas desafiante de Sierras Chicas."
    />
    <!--Favicon-->
    <link
      rel="icon"
      type="image/jpeg"
      href="../assets/favicon/favicon-buffo.jpeg"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <!--CSS-->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <nav></nav>
    <header></header>
    <main></main>
    <footer></footer>
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Script for Navbar -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const navbar = document.querySelector(".navbar");

        // Función para cambiar color del navbar en scroll
        window.addEventListener("scroll", function () {
          if (window.scrollY > 50) {
            navbar.classList.add("scrolled");
          } else {
            navbar.classList.remove("scrolled");
          }
        });

        // Trigger scroll check on load just in case page is refreshed midway
        if (window.scrollY > 50) {
          navbar.classList.add("scrolled");
        }
      });
    </script>
  </body>
</html>
